<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>{{TITLE}}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    /* 全局样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }

    #root {
      width: 100%;
      margin-left: auto;
      margin-right: auto;
      height: 100%;
      min-height: 100vh;
      overflow: visible;
    }

    /* 如果是元素演示页面（可能被内嵌到 iframe），设置固定尺寸 */
    body.is-element-page #root {
      width: 100vw;
      height: 100vh;
    }

    /* 平板和手机模式隐藏滚动条 */
    @media (max-width: 1024px) {
      ::-webkit-scrollbar {
        display: none;
      }

      html,
      body {
        scrollbar-width: none;
        /* Firefox */
      }
    }
  </style>
</head>

<body>

  <script>
    // 判断是否为元素演示页面（在 body 加载后执行）
    (function () {
      if (document.body && window.location.pathname.includes('/components/')) {
        document.body.classList.add('is-element-page');
      } else if (!document.body) {
        // 如果 body 还没加载，等待 DOMContentLoaded
        document.addEventListener('DOMContentLoaded', function () {
          if (window.location.pathname.includes('/components/')) {
            document.body.classList.add('is-element-page');
          }
        });
      }
    })();
  </script>

  <div id="root"></div>

  <!-- 加载 bootstrap JS（会自动挂载到 window.HtmlTemplateBootstrap） -->
  <script src="{{BOOTSTRAP_PATH}}"></script>

  <script>
    (function () {
      function init() {
        var bootstrap = window.HtmlTemplateBootstrap;
        if (!bootstrap) {
          setTimeout(init, 10);
          return;
        }

        window.React = bootstrap.React;
        window.ReactDOM = bootstrap.ReactDOM;

        var resolvedComponent = null;
        window.__AXHUB_DEFINE_COMPONENT__ = function (Component) {
          resolvedComponent = Component;
        };

        window.__AXHUB_RENDER_COMPONENT__ = function () {
          if (!resolvedComponent) return false;
          try {
            delete window.__AXHUB_DEFINE_COMPONENT__;
          } catch {}
          bootstrap.renderComponent(resolvedComponent);
          return true;
        };
      }

      init();
    })();
  </script>

  <script src="{{ENTRY}}"></script>

  <script>
    (function () {
      function render() {
        if (window.__AXHUB_RENDER_COMPONENT__ && window.__AXHUB_RENDER_COMPONENT__()) return;
        setTimeout(render, 10);
      }
      render();
    })();
  </script>

</body>

</html>
